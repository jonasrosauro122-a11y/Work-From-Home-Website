<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VA Dashboard Pro</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">

/* ================= NOTIFICATIONS ================= */
function checkNotifications() {
  filteredData.forEach(d => {
    let left = daysLeft(d.start);

    if (left === 10) {
      showNotification(`${d.name} has only 10 days left!`);
    }
  });
}

function showNotification(message) {
  const notif = document.createElement("div");
  notif.innerText = message;

  notif.style.position = "fixed";
  notif.style.bottom = "20px";
  notif.style.right = "20px";
  notif.style.background = "#f59e0b";
  notif.style.color = "#000";
  notif.style.padding = "15px 20px";
  notif.style.borderRadius = "10px";
  notif.style.boxShadow = "0 10px 20px rgba(0,0,0,0.3)";
  notif.style.zIndex = "999";
  notif.style.fontWeight = "bold";
  notif.style.animation = "fadeIn 0.5s ease";

  document.body.appendChild(notif);

  setTimeout(() => {
    notif.remove();
  }, 5000);
}

/* ================= INIT ================= */
loadData();

/* Run notification check every 10 seconds */
setInterval(checkNotifications, 10000);

</script>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  margin: 0;
  color: #fff;
  background: linear-gradient(-45deg, #0f172a, #1e293b, #0ea5e9, #9333ea);
  background-size: 400% 400%;
  animation: gradientBG 12s ease infinite;
}

@keyframes gradientBG {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.container { max-width: 1200px; margin: auto; padding: 20px; }

h1 { text-align: center; }

.card {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
  padding: 20px;
  border-radius: 16px;
  margin-bottom: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  animation: fadeIn 0.5s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

input, select {
  padding: 10px;
  width: 100%;
  margin: 5px 0;
  border-radius: 8px;
  border: none;
}

button {
  padding: 10px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(135deg,#38bdf8,#6366f1);
  color: white;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
}

.table-wrapper {
  overflow-x: auto;
}

table { width: 100%; border-collapse: collapse; }
th, td { padding: 10px; text-align: center; }
th { background: rgba(255,255,255,0.2); }
tr:nth-child(even) { background: rgba(255,255,255,0.05); }

.badge { padding: 5px 10px; border-radius: 8px; }
.green { background: #22c55e; }
.orange { background: #f59e0b; }
.gray { background: #64748b; }

.filters {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
}
</style>
</head>

<body>
<div class="container">

<h1>VA Dashboard Pro 🚀</h1>

<div class="card">
<input id="vaName" placeholder="VA Name">
<select id="vaTag">
<option value="">Select VA Tag</option>
<option>Combo VA</option>
<option>General VA</option>
<option>Executive Assistant</option>
</select>
<input id="agency" placeholder="Agency">
<select id="tl">
<option value="">Team Leader</option>
<option>Martin</option>
<option>RJ</option>
<option>Ed</option>
<option>Rezyl</option>
<option>Karla</option>
</select>
<input type="date" id="startDate">
<button onclick="addVA()">Save VA</button>
</div>

<div class="card filters">
<input id="searchInput" placeholder="Search VA name...">
<select id="filterTL">
<option value="">Filter by TL</option>
<option>Martin</option>
<option>RJ</option>
<option>Ed</option>
<option>Rezyl</option>
<option>Karla</option>
</select>
<button onclick="applyFilter()">Search</button>
</div>

<div class="card table-wrapper">
<table>
<thead>
<tr>
<th>Name</th>
<th>Tag</th>
<th>Agency</th>
<th>TL</th>
<th>Start</th>
<th>WFH</th>
<th>Status</th>
<th>Days Left</th>
<th>Actions</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>
</div>

</div>

<script>
const SUPABASE_URL = "https://rapwcdljrqvurrukumcj.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJhcHdjZGxqcnF2dXJydWt1bWNqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3NDYwMzUsImV4cCI6MjA5MTMyMjAzNX0.C7XzwOeluKknt6Gx48eI9890uG-XgekLBs_cc7vjojg";

const { createClient } = supabase;
const supabaseClient = createClient(SUPABASE_URL, SUPABASE_KEY);

let data = [];
let filteredData = [];
let editingId = null;

function calc45(date) {
  let d = new Date(date);
  d.setDate(d.getDate() + 45);
  return d;
}

function daysLeft(start) {
  return Math.ceil((calc45(start) - new Date()) / (1000 * 60 * 60 * 24));
}

async function loadData() {
  const { data: result } = await supabaseClient.from('vas').select('*').order('id', { ascending: false });
  data = result || [];
  filteredData = data;
  render();
}

function applyFilter() {
  const search = document.getElementById("searchInput").value.toLowerCase();
  const tlFilter = document.getElementById("filterTL").value;

  filteredData = data.filter(d => {
    return (
      d.name.toLowerCase().includes(search) &&
      (tlFilter === "" || d.tl === tlFilter)
    );
  });

  render();
}

async function addVA() {
  const name = document.getElementById("vaName").value;
  const tag = document.getElementById("vaTag").value;
  const agency = document.getElementById("agency").value;
  const tl = document.getElementById("tl").value;
  const start = document.getElementById("startDate").value;

  if (!name || !tag || !agency || !tl || !start) {
    alert("Complete all fields");
    return;
  }

  const payload = { name, tag, agency, tl, start };

  if (editingId) {
    await supabaseClient.from('vas').update(payload).eq('id', editingId);
  } else {
    await supabaseClient.from('vas').insert([payload]);
  }

  clear();
  loadData();
}

async function deleteVA(id) {
  if (confirm("Delete this VA?")) {
    await supabaseClient.from('vas').delete().eq('id', id);
    loadData();
  }
}

function editVA(id) {
  const v = data.find(x => x.id === id);

  vaName.value = v.name;
  vaTag.value = v.tag;
  agency.value = v.agency;
  tl.value = v.tl;
  startDate.value = v.start;

  editingId = id;
}

function clear() {
  vaName.value = "";
  vaTag.value = "";
  agency.value = "";
  tl.value = "";
  startDate.value = "";
  editingId = null;
}

function render() {
  const table = document.getElementById("table");
  table.innerHTML = "";

  filteredData.forEach(d => {
    let left = daysLeft(d.start);
    let diff = (new Date() - new Date(d.start)) / 86400000;

    let status = diff >= 45 ? "Ready" : diff >= 35 ? "Near" : "Normal";
    let badge = diff >= 45 ? "green" : diff >= 35 ? "orange" : "gray";

    table.innerHTML += `
      <tr>
        <td>${d.name}</td>
        <td>${d.tag}</td>
        <td>${d.agency}</td>
        <td>${d.tl}</td>
        <td>${d.start}</td>
        <td>${calc45(d.start).toISOString().split("T")[0]}</td>
        <td><span class="badge ${badge}">${status}</span></td>
        <td>${left}</td>
        <td>
          <button onclick="editVA(${d.id})">Edit</button>
          <button onclick="deleteVA(${d.id})">Delete</button>
        </td>
      </tr>
    `;
  });
}

loadData();
</script>

</body>
</html>
