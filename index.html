<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VA Dashboard Pro</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: linear-gradient(135deg,#0f172a,#1e293b);
  color: #fff;
}
.container { max-width: 1200px; margin: auto; padding: 20px; }

.card {
  background: rgba(255,255,255,0.05);
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 10px;
}

input, select, button {
  padding: 10px;
  width: 100%;
  margin: 5px 0;
  border-radius: 8px;
  border: none;
}

button {
  background: #38bdf8;
  font-weight: bold;
  cursor: pointer;
}

table { width: 100%; border-collapse: collapse; }
th, td { padding: 10px; text-align: center; }
th { background: #38bdf8; color: black; }
tr:nth-child(even) { background: rgba(255,255,255,0.05); }
</style>
</head>

<body>
<div class="container">

<h1>VA Dashboard Pro 🚀</h1>

<div class="card">
<input id="vaName" placeholder="VA Name">

<select id="vaTag">
<option value="">Select VA Tag</option>
<option>Combo VA</option>
<option>General VA</option>
<option>Executive Assistant</option>
</select>

<input id="agency" placeholder="Agency">

<select id="tl">
<option value="">Team Leader</option>
<option>Martin</option>
<option>RJ</option>
<option>Ed</option>
<option>Rezyl</option>
<option>Karla</option>
</select>

<input type="date" id="startDate">

<button onclick="addVA()">Save VA</button>
</div>

<div class="card">
<table>
<thead>
<tr>
<th>Name</th>
<th>Tag</th>
<th>Agency</th>
<th>TL</th>
<th>Start</th>
<th>Actions</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>
</div>

</div>

<script>
/* ================= SUPABASE ================= */
const SUPABASE_URL = "https://rapwcdljrqvurrukumcj.supabase.co";
const SUPABASE_KEY = "YOUR_ANON_KEY_HERE";

const { createClient } = supabase;
const supabaseClient = createClient(SUPABASE_URL, SUPABASE_KEY);

/* ================= STATE ================= */
let data = [];
let editingId = null;

/* ================= LOAD ================= */
async function loadData() {
  const { data: result, error } = await supabaseClient
    .from('vas')
    .select('*')
    .order('id', { ascending: false });

  if (error) {
    console.error(error);
    return;
  }

  data = result || [];
  render();
}

/* ================= SAVE ================= */
async function addVA() {
  const name = document.getElementById("vaName").value;
  const tag = document.getElementById("vaTag").value;
  const agency = document.getElementById("agency").value;
  const tl = document.getElementById("tl").value;
  const start = document.getElementById("startDate").value;

  if (!name || !tag || !agency || !tl || !start) {
    alert("Complete all fields");
    return;
  }

  const payload = { name, tag, agency, tl, start };

  let result;

  if (editingId) {
    result = await supabaseClient
      .from('vas')
      .update(payload)
      .eq('id', editingId);
  } else {
    result = await supabaseClient
      .from('vas')
      .insert([payload]);
  }

  if (result.error) {
    alert(result.error.message);
    return;
  }

  clear();
  loadData();
}

/* ================= DELETE ================= */
async function deleteVA(id) {
  await supabaseClient.from('vas').delete().eq('id', id);
  loadData();
}

/* ================= EDIT ================= */
function editVA(id) {
  const v = data.find(x => x.id === id);

  document.getElementById("vaName").value = v.name;
  document.getElementById("vaTag").value = v.tag;
  document.getElementById("agency").value = v.agency;
  document.getElementById("tl").value = v.tl;
  document.getElementById("startDate").value = v.start;

  editingId = id;
}

/* ================= CLEAR ================= */
function clear() {
  document.getElementById("vaName").value = "";
  document.getElementById("vaTag").value = "";
  document.getElementById("agency").value = "";
  document.getElementById("tl").value = "";
  document.getElementById("startDate").value = "";
  editingId = null;
}

/* ================= RENDER ================= */
function render() {
  const table = document.getElementById("table");
  table.innerHTML = "";

  data.forEach(d => {
    table.innerHTML += `
      <tr>
        <td>${d.name}</td>
        <td>${d.tag}</td>
        <td>${d.agency}</td>
        <td>${d.tl}</td>
        <td>${d.start}</td>
        <td>
          <button onclick="editVA(${d.id})">Edit</button>
          <button onclick="deleteVA(${d.id})">Delete</button>
        </td>
      </tr>
    `;
  });
}

/* ================= INIT ================= */
loadData();

/* ================= REALTIME ================= */
supabaseClient
  .channel('vas')
  .on('postgres_changes',
    { event: '*', schema: 'public', table: 'vas' },
    () => loadData()
  )
  .subscribe();
</script>

</body>
</html>
