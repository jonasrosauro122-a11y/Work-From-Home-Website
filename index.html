<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VA Dashboard Pro</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
body {
  font-family: Arial;
  margin: 0;
  background: linear-gradient(135deg,#0f172a,#1e293b);
  color: #fff;
}
.container {
  max-width: 1200px;
  margin: auto;
  padding: 20px;
}
h1 {
  text-align: center;
  margin-bottom: 20px;
}
.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  padding: 15px;
  border-radius: 14px;
  margin-bottom: 15px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}
input, select, button {
  padding: 10px;
  margin: 5px 0;
  width: 100%;
  border-radius: 10px;
  border: none;
  outline: none;
}
button {
  background: linear-gradient(90deg,#38bdf8,#6366f1);
  color: white;
  cursor: pointer;
  transition: 0.3s;
  font-weight: bold;
}
button:hover {
  transform: scale(1.02);
}
table {
  width: 100%;
  border-collapse: collapse;
}
th, td {
  padding: 10px;
  text-align: center;
}
th {
  background: #38bdf8;
  color: black;
}
tr:nth-child(even) {
  background: rgba(255,255,255,0.05);
}
.badge {
  padding: 5px 10px;
  border-radius: 8px;
  font-weight: bold;
}
.green { background:#22c55e; }
.orange { background:#f59e0b; }
.gray { background:#64748b; }
.red { background:#ef4444; }
.flex {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.stats {
  display: grid;
  grid-template-columns: repeat(4,1fr);
  gap: 10px;
  text-align: center;
}
.alert {
  background: #ef4444;
  padding: 10px;
  border-radius: 10px;
  margin-bottom: 8px;
}
</style>
</head>
<body>
<div class="container">

<h1>VA Dashboard Pro 🚀</h1>

<div class="card stats">
<div>Total VAs: <span id="total">0</span></div>
<div>Near 45 Days: <span id="near">0</span></div>
<div>Ready for WFH: <span id="ready">0</span></div>
<div>Urgent (≤3 days): <span id="urgent">0</span></div>
</div>

<div id="alertBox"></div>

<div class="card">
<div class="flex">
<input id="vaName" placeholder="VA Name">
<select id="vaTag">
<option value="">Select VA Tag</option>
<option>Combo VA</option>
<option>General VA</option>
<option>Executive Assistant</option>
</select>
<input id="agency" placeholder="Agency">
<select id="tl">
<option value="">Select Team Leader</option>
<option>Martin</option>
<option>RJ</option>
<option>Ed</option>
<option>Rezyl</option>
<option>Karla</option>
</select>
<input type="date" id="startDate">
</div>
<button onclick="addVA()">Add VA</button>
<button onclick="exportExcel()">Export to Excel</button>
</div>

<div class="card">
<div class="flex">
<select id="filterTL" onchange="render()">
<option value="">Filter by TL</option>
<option>Martin</option>
<option>RJ</option>
<option>Ed</option>
<option>Rezyl</option>
<option>Karla</option>
</select>
<select id="filterTag" onchange="render()">
<option value="">Filter by VA Tag</option>
<option>Combo VA</option>
<option>General VA</option>
<option>Executive Assistant</option>
</select>
<input id="searchName" placeholder="Search VA Name" onkeyup="render()">
</div>
</div>

<div class="card">
<table>
<thead>
<tr>
<th>Name</th><th>Tag</th><th>Agency</th><th>TL</th><th>Start</th><th>WFH (45th Day)</th><th>Status</th><th>Days Left</th><th>Actions</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>
</div>

</div>

<script>
let data = JSON.parse(localStorage.getItem('vaDataPro')) || [];

function calc45(date) {
  let d = new Date(date);
  d.setDate(d.getDate() + 45);
  return d;
}

function daysLeft(start) {
  let wfh = calc45(start);
  let today = new Date();
  return Math.ceil((wfh - today) / (1000 * 60 * 60 * 24));
}

function getStatus(start) {
  let diff = (new Date() - new Date(start)) / (1000 * 60 * 60 * 24);
  if (diff >= 45) return 'ready';
  if (diff >= 35) return 'near';
  return 'normal';
}

function addVA() {
  let obj = {
    name: vaName.value,
    tag: vaTag.value,
    agency: agency.value,
    tl: tl.value,
    start: startDate.value
  };

  if (!obj.name || !obj.start || !obj.tl || !obj.tag) return alert('Complete fields');

  data.push(obj);
  save();
  render();
  clear();
}

function render() {
  let table = document.getElementById('table');
  let alertBox = document.getElementById('alertBox');

  table.innerHTML = '';
  alertBox.innerHTML = '';

  let total = 0, near = 0, ready = 0, urgent = 0;

  let fTL = filterTL.value.toLowerCase();
  let fTag = filterTag.value.toLowerCase();
  let search = searchName.value.toLowerCase();

  let sorted = [...data].sort((a, b) => daysLeft(a.start) - daysLeft(b.start));

  sorted.forEach(d => {
    if (fTL && d.tl.toLowerCase() !== fTL) return;
    if (fTag && d.tag.toLowerCase() !== fTag) return;
    if (search && !d.name.toLowerCase().includes(search)) return;

    let wfhDate = calc45(d.start);
    let left = daysLeft(d.start);

    let diff = (new Date() - new Date(d.start)) / (1000 * 60 * 60 * 24);

    if (diff >= 35) near++;
    if (diff >= 45) ready++;

    if (left <= 3 && left >= 0) {
      urgent++;
      alertBox.innerHTML += `<div class=\"alert\">⚠️ ${d.name} (${d.tl}) will reach 45 days in ${left} day(s)</div>`;
    }

    total++;

    let badgeClass = diff >= 45 ? 'green' : diff >= 35 ? 'orange' : 'gray';
    let badgeText = diff >= 45 ? 'Ready' : diff >= 35 ? 'Near' : 'Normal';

    table.innerHTML += `
      <tr>
        <td>${d.name}</td>
        <td>${d.tag}</td>
        <td>${d.agency}</td>
        <td>${d.tl}</td>
        <td>${d.start}</td>
        <td>${wfhDate.toISOString().split('T')[0]}</td>
        <td><span class=\"badge ${badgeClass}\">${badgeText}</span></td>
        <td>${left}</td>
        <td>
          <button onclick=\"editVA(${data.indexOf(d)})\">Edit</button>
          <button onclick=\"deleteVA(${data.indexOf(d)})\">Delete</button>
        </td>
      </tr>
    `;
  });

  document.getElementById('total').innerText = total;
  document.getElementById('near').innerText = near;
  document.getElementById('ready').innerText = ready;
  document.getElementById('urgent').innerText = urgent;
}

function deleteVA(i) {
  if (confirm('Delete?')) {
    data.splice(i, 1);
    save();
    render();
  }
}

function editVA(i) {
  let d = data[i];
  vaName.value = d.name;
  vaTag.value = d.tag;
  agency.value = d.agency;
  tl.value = d.tl;
  startDate.value = d.start;
  deleteVA(i);
}

function save() {
  localStorage.setItem('vaDataPro', JSON.stringify(data));
}

function clear() {
  vaName.value = '';
  vaTag.value = '';
  agency.value = '';
  tl.value = '';
  startDate.value = '';
}

function exportExcel() {
  let exportData = data.map(d => ({
    Name: d.name,
    Tag: d.tag,
    Agency: d.agency,
    TL: d.tl,
    Start: d.start,
    WFH: calc45(d.start).toISOString().split('T')[0]
  }));

  let ws = XLSX.utils.json_to_sheet(exportData);
  let wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "VAs");
  XLSX.writeFile(wb, "VA_Dashboard.xlsx");
}

render();
</script>

</body>
</html>
