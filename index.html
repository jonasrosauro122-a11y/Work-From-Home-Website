<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VA Dashboard Pro</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: linear-gradient(135deg,#0f172a,#1e293b);
  color: #fff;
}
.container { max-width: 1200px; margin: auto; padding: 20px; }
h1 { text-align: center; }

.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  padding: 15px;
  border-radius: 14px;
  margin-bottom: 15px;
}

input, select, button {
  padding: 10px;
  margin: 5px 0;
  width: 100%;
  border-radius: 10px;
  border: none;
}

button {
  background: linear-gradient(90deg,#38bdf8,#6366f1);
  color: white;
  cursor: pointer;
  font-weight: bold;
}

table { width: 100%; border-collapse: collapse; }
th, td { padding: 10px; text-align: center; }
th { background: #38bdf8; color: black; }
tr:nth-child(even) { background: rgba(255,255,255,0.05); }

.badge { padding: 5px 10px; border-radius: 8px; }
.green { background:#22c55e; }
.orange { background:#f59e0b; }
.gray { background:#64748b; }

.flex { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

.alert { background: #ef4444; padding: 10px; border-radius: 10px; margin-bottom: 5px; }
</style>
</head>

<body>
<div class="container">

<h1>VA Dashboard Pro 🚀</h1>

<div class="card">
<input id="vaName" placeholder="VA Name">
<select id="vaTag">
  <option value="">Select VA Tag</option>
  <option>Combo VA</option>
  <option>General VA</option>
  <option>Executive Assistant</option>
</select>

<input id="agency" placeholder="Agency">

<select id="tl">
  <option value="">Team Leader</option>
  <option>Martin</option>
  <option>RJ</option>
  <option>Ed</option>
  <option>Rezyl</option>
  <option>Karla</option>
</select>

<input type="date" id="startDate">

<button onclick="addVA()">Save VA</button>
<button onclick="exportExcel()">Export</button>
</div>

<div class="card">
<table>
<thead>
<tr>
<th>Name</th><th>Tag</th><th>Agency</th><th>TL</th><th>Start</th><th>Status</th><th>Days Left</th><th>Actions</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>
</div>

</div>

<script>
/* ================= SUPABASE ================= */
const SUPABASE_URL = "https://rapwcdljrqvurrukumcj.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJhcHdjZGxqcnF2dXJydWt1bWNqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3NDYwMzUsImV4cCI6MjA5MTMyMjAzNX0.C7XzwOeluKknt6Gx48eI9890uG-XgekLBs_cc7vjojg";

const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* ================= STATE ================= */
let data = [];
let editingId = null;

/* ================= HELPERS ================= */
function calc45(date) {
  let d = new Date(date);
  d.setDate(d.getDate() + 45);
  return d;
}

function daysLeft(start) {
  return Math.ceil((calc45(start) - new Date()) / (1000 * 60 * 60 * 24));
}

/* ================= LOAD ================= */
async function loadData() {
  const { data: result } = await client.from('vas').select('*').order('id', { ascending: false });
  data = result || [];
  render();
}

/* ================= ADD / UPDATE ================= */
async function addVA() {
  const payload = {
    name: vaName.value,
    tag: vaTag.value,
    agency: agency.value,
    tl: tl.value,
    start: startDate.value
  };

  if (editingId) {
    await client.from('vas').update(payload).eq('id', editingId);
    editingId = null;
  } else {
    await client.from('vas').insert([payload]);
  }

  clear();
  loadData();
}

/* ================= DELETE ================= */
async function deleteVA(id) {
  await client.from('vas').delete().eq('id', id);
  loadData();
}

/* ================= EDIT ================= */
function editVA(id) {
  const d = data.find(v => v.id === id);
  vaName.value = d.name;
  vaTag.value = d.tag;
  agency.value = d.agency;
  tl.value = d.tl;
  startDate.value = d.start;
  editingId = id;
}

/* ================= CLEAR ================= */
function clear() {
  vaName.value = "";
  vaTag.value = "";
  agency.value = "";
  tl.value = "";
  startDate.value = "";
}

/* ================= RENDER ================= */
function render() {
  let table = document.getElementById("table");
  table.innerHTML = "";

  data.forEach(d => {
    let left = daysLeft(d.start);

    let badge = left <= 0 ? "green" : left <= 10 ? "orange" : "gray";
    let status = left <= 0 ? "Ready" : "Processing";

    table.innerHTML += `
      <tr>
        <td>${d.name}</td>
        <td>${d.tag}</td>
        <td>${d.agency}</td>
        <td>${d.tl}</td>
        <td>${d.start}</td>
        <td><span class="badge ${badge}">${status}</span></td>
        <td>${left}</td>
        <td>
          <button onclick="editVA(${d.id})">Edit</button>
          <button onclick="deleteVA(${d.id})">Delete</button>
        </td>
      </tr>
    `;
  });
}

/* ================= EXPORT ================= */
function exportExcel() {
  const ws = XLSX.utils.json_to_sheet(data);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "VAs");
  XLSX.writeFile(wb, "VA_Dashboard.xlsx");
}

/* ================= INIT ================= */
loadData();

/* ================= REALTIME ================= */
client
  .channel('vas')
  .on('postgres_changes',
    { event: '*', schema: 'public', table: 'vas' },
    () => loadData()
  )
  .subscribe();

</script>

</body>
</html>
