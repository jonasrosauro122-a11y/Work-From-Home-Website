<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LAVA VA Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  margin: 0;
  color: #fff;
  background: linear-gradient(-45deg, #0f172a, #1e293b, #0ea5e9, #9333ea);
  background-size: 400% 400%;
  animation: gradientBG 12s ease infinite;
}

@keyframes gradientBG {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.container { max-width: 1200px; margin: auto; padding: 20px; }
h1 { text-align: center; }

.card {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
  padding: 20px;
  border-radius: 16px;
  margin-bottom: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

input, select {
  padding: 10px;
  width: 100%;
  margin: 5px 0;
  border-radius: 8px;
  border: none;
}

button {
  padding: 10px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(135deg,#38bdf8,#6366f1);
  color: white;
  font-weight: bold;
  cursor: pointer;
}

button:hover { transform: scale(1.05); }

.table-wrapper { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; }
th, td { padding: 10px; text-align: center; }
th { background: rgba(255,255,255,0.2); }
tr:nth-child(even) { background: rgba(255,255,255,0.05); }

.badge { padding: 5px 10px; border-radius: 8px; }
.green { background: #22c55e; }
.orange { background: #f59e0b; }
.gray { background: #64748b; }

.filters {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}

/* Scroll Animation */
.fade-scroll {
  opacity: 0;
  transform: translateY(20px);
  transition: all 0.6s ease;
}

.fade-scroll.show {
  opacity: 1;
  transform: translateY(0);
}

/* Urgent */
.urgent {
  background: rgba(239, 68, 68, 0.2) !important;
  animation: pulse 1.5s infinite;
}

@keyframes pulse {
  0% { box-shadow: 0 0 0 0 rgba(239,68,68,0.6); }
  70% { box-shadow: 0 0 0 10px rgba(239,68,68,0); }
  100% { box-shadow: 0 0 0 0 rgba(239,68,68,0); }
}

/* Stats */
.stats {
  display: flex;
  justify-content: space-around;
  font-size: 18px;
  font-weight: bold;
}
</style>
</head>

<body>
<div class="container">

<h1>LAVA VA Dashboard</h1>

<!-- FORM -->
<div class="card">
<input id="vaName" placeholder="VA Name">
<select id="vaTag">
<option value="">Select VA Tag</option>
<option>Combo VA</option>
<option>General VA</option>
<option>Executive Assistant</option>
</select>
<input id="agency" placeholder="Agency">
<select id="tl">
<option value="">Team Leader</option>
<option>Martin</option>
<option>RJ</option>
<option>Ed</option>
<option>Rezyl</option>
<option>Karla</option>
</select>
<input type="date" id="startDate">
<button onclick="addVA()">Save VA</button>
</div>

<!-- FILTERS -->
<div class="card filters">
<input id="searchInput" placeholder="Search VA name...">
<select id="filterTL">
<option value="">Filter by TL</option>
<option>Martin</option>
<option>RJ</option>
<option>Ed</option>
<option>Rezyl</option>
<option>Karla</option>
</select>
<select id="filterStatus">
<option value="">Filter by Status</option>
<option>Ready</option>
<option>Near</option>
<option>Normal</option>
</select>
<button onclick="applyFilter()">Search</button>
</div>

<!-- STATS -->
<div class="card stats">
<div>Ready: <span id="readyCount">0</span></div>
<div>Near: <span id="nearCount">0</span></div>
<div>Normal: <span id="normalCount">0</span></div>
</div>

<!-- TABLE -->
<div class="card table-wrapper">
<table>
<thead>
<tr>
<th>Name</th>
<th>Tag</th>
<th>Agency</th>
<th>TL</th>
<th>Start</th>
<th>WFH</th>
<th>Status</th>
<th>Days Left</th>
<th>Actions</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>
</div>

</div>

<script>
const SUPABASE_URL = "https://rapwcdljrqvurrukumcj.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJhcHdjZGxqcnF2dXJydWt1bWNqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3NDYwMzUsImV4cCI6MjA5MTMyMjAzNX0.C7XzwOeluKknt6Gx48eI9890uG-XgekLBs_cc7vjojg";

const { createClient } = supabase;
const supabaseClient = createClient(SUPABASE_URL, SUPABASE_KEY);

let data = [];
let filteredData = [];
let editingId = null;

/* DATE LOGIC */
function calc45(date) {
  let d = new Date(date);
  d.setDate(d.getDate() + 45);
  return d;
}

function daysLeft(start) {
  return Math.ceil((calc45(start) - new Date()) / (1000 * 60 * 60 * 24));
}

/* LOAD */
async function loadData() {
  const { data: result } = await supabaseClient.from('vas').select('*');
  data = (result || []).sort((a, b) => new Date(a.start) - new Date(b.start));
  filteredData = data;
  render();
}

/* FILTER */
function applyFilter() {
  const search = searchInput.value.toLowerCase();
  const tlFilter = filterTL.value;
  const statusFilter = filterStatus.value;

  filteredData = data.filter(d => {
    let diff = (new Date() - new Date(d.start)) / 86400000;
    let status = diff >= 45 ? "Ready" : diff >= 35 ? "Near" : "Normal";

    return (
      d.name.toLowerCase().includes(search) &&
      (tlFilter === "" || d.tl === tlFilter) &&
      (statusFilter === "" || status === statusFilter)
    );
  });

  render();
}

/* ADD */
async function addVA() {
  const payload = {
    name: vaName.value,
    tag: vaTag.value,
    agency: agency.value,
    tl: tl.value,
    start: startDate.value
  };

  if (!payload.name || !payload.tag || !payload.agency || !payload.tl || !payload.start) {
    alert("Complete all fields");
    return;
  }

  if (editingId) {
    await supabaseClient.from('vas').update(payload).eq('id', editingId);
  } else {
    await supabaseClient.from('vas').insert([payload]);
  }

  clear();
  loadData();
}

/* DELETE */
async function deleteVA(id) {
  if (confirm("Delete this VA?")) {
    await supabaseClient.from('vas').delete().eq('id', id);
    loadData();
  }
}

/* EDIT */
function editVA(id) {
  const v = data.find(x => x.id === id);
  vaName.value = v.name;
  vaTag.value = v.tag;
  agency.value = v.agency;
  tl.value = v.tl;
  startDate.value = v.start;
  editingId = id;
}

function clear() {
  vaName.value = "";
  vaTag.value = "";
  agency.value = "";
  tl.value = "";
  startDate.value = "";
  editingId = null;
}

/* RENDER */
function render() {
  const table = document.getElementById("table");
  table.innerHTML = "";

  let ready = 0, near = 0, normal = 0;

  filteredData.forEach(d => {
    let left = daysLeft(d.start);
    let diff = (new Date() - new Date(d.start)) / 86400000;

    let status = diff >= 45 ? "Ready" : diff >= 35 ? "Near" : "Normal";
    let badge = diff >= 45 ? "green" : diff >= 35 ? "orange" : "gray";

    if (status === "Ready") ready++;
    else if (status === "Near") near++;
    else normal++;

    let urgentClass = left <= 5 ? "urgent" : "";

    table.innerHTML += `
      <tr class="fade-scroll ${urgentClass}">
        <td>${d.name}</td>
        <td>${d.tag}</td>
        <td>${d.agency}</td>
        <td>${d.tl}</td>
        <td>${d.start}</td>
        <td>${calc45(d.start).toISOString().split("T")[0]}</td>
        <td><span class="badge ${badge}">${status}</span></td>
        <td>${left}</td>
        <td>
          <button onclick="editVA(${d.id})">Edit</button>
          <button onclick="deleteVA(${d.id})">Delete</button>
        </td>
      </tr>
    `;
  });

  readyCount.innerText = ready;
  nearCount.innerText = near;
  normalCount.innerText = normal;

  setTimeout(handleScrollAnimation, 100);
}

/* SCROLL ANIMATION */
function handleScrollAnimation() {
  document.querySelectorAll(".fade-scroll").forEach(el => {
    const rect = el.getBoundingClientRect();
    if (rect.top < window.innerHeight - 50) {
      el.classList.add("show");
    } else {
      el.classList.remove("show");
    }
  });
}

window.addEventListener("scroll", handleScrollAnimation);

loadData();
</script>

</body>
</html>
