<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VA Floor Plan System</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

/* FLOOR */
#floor {
  position: relative;
  width: 100%;
  height: 90vh;
  background: #1e293b;
  overflow: hidden;
}

/* STATION */
.station {
  position: absolute;
  width: 120px;
  height: 85px;
  background: #334155;
  border-radius: 10px;
  padding: 6px;
  cursor: pointer;
  transition: 0.2s;
}

.station:hover {
  transform: scale(1.05);
}

.title {
  font-size: 12px;
  font-weight: bold;
}

.name {
  font-size: 12px;
  margin-top: 4px;
}

.time {
  font-size: 10px;
  opacity: 0.8;
}

/* DOOR */
.door {
  position: absolute;
  width: 140px;
  height: 80px;
  background: #64748b;
  right: 20px;
  top: 20px;
  text-align: center;
  line-height: 80px;
  border-radius: 10px;
}

/* MODAL */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  display: none;
  align-items: center;
  justify-content: center;
}

.modal-box {
  background: #1e293b;
  padding: 20px;
  border-radius: 12px;
  width: 280px;
}

input {
  width: 100%;
  padding: 8px;
  margin: 5px 0;
  border-radius: 6px;
  border: none;
}

button {
  padding: 8px;
  border: none;
  border-radius: 6px;
  margin-top: 5px;
  width: 100%;
  cursor: pointer;
}
</style>
</head>

<body>

<h3 style="text-align:center;padding:10px;">🪑 VA FLOOR PLAN SYSTEM</h3>

<div id="floor"></div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-box">
    <h3 id="stationTitle">Station</h3>

    <input id="vaName" placeholder="VA Name">
    <input id="timeIn" type="time">
    <input id="timeOut" type="time">

    <button onclick="save()">Save</button>
    <button onclick="closeModal()">Close</button>
  </div>
</div>

<script>
const supabase = window.supabase.createClient(
  "YOUR_SUPABASE_URL",
  "YOUR_SUPABASE_KEY"
);

/* YOUR FLOOR PLAN BASED ON DRAWING */
const layout = [
  // TOP ROW
  {id:"A1", x:40, y:40},
  {id:"A2", x:180, y:40},
  {id:"A3", x:320, y:40},
  {id:"A4", x:460, y:40},
  {id:"A5", x:600, y:40},
  {id:"A6", x:740, y:40},

  // MIDDLE ROW
  {id:"B1", x:40, y:180},
  {id:"B2", x:180, y:180},
  {id:"B3", x:320, y:180},
  {id:"B4", x:460, y:180},
  {id:"B5", x:600, y:180},
  {id:"B6", x:740, y:180},

  // LOWER ROW
  {id:"C1", x:40, y:320},
  {id:"C2", x:180, y:320},
  {id:"C3", x:320, y:320},
  {id:"C4", x:460, y:320},
  {id:"C5", x:600, y:320},
  {id:"C6", x:740, y:320}
];

let selectedStation = null;

/* LOAD FLOOR */
async function load() {
  const { data } = await supabase.from("floor").select("*");

  const floor = document.getElementById("floor");
  floor.innerHTML = "";

  /* DOOR */
  const door = document.createElement("div");
  door.className = "door";
  door.innerText = "DOOR";
  floor.appendChild(door);

  layout.forEach(pos => {

    const found = data?.find(d => d.station === pos.id);

    const div = document.createElement("div");
    div.className = "station";
    div.style.left = pos.x + "px";
    div.style.top = pos.y + "px";

    div.innerHTML = `
      <div class="title">${pos.id}</div>
      <div class="name">${found?.name || "Empty"}</div>
      <div class="time">
        ${found?.time_in || "--"} - ${found?.time_out || "--"}
      </div>
    `;

    div.onclick = () => openModal(pos.id, found);

    floor.appendChild(div);
  });
}

/* OPEN MODAL */
function openModal(id, data) {
  selectedStation = id;

  document.getElementById("stationTitle").innerText = "Station " + id;

  vaName.value = data?.name || "";
  timeIn.value = data?.time_in || "";
  timeOut.value = data?.time_out || "";

  document.getElementById("modal").style.display = "flex";
}

/* CLOSE */
function closeModal() {
  document.getElementById("modal").style.display = "none";
}

/* SAVE */
async function save() {

  const payload = {
    station: selectedStation,
    name: vaName.value,
    time_in: timeIn.value,
    time_out: timeOut.value
  };

  const { data } = await supabase
    .from("floor")
    .select("*")
    .eq("station", selectedStation);

  if (data.length > 0) {
    await supabase.from("floor")
      .update(payload)
      .eq("station", selectedStation);
  } else {
    await supabase.from("floor")
      .insert([payload]);
  }

  closeModal();
  load();
}

load();
</script>

</body>
</html>
