<style>
  body {
    font-family: Arial;
    text-align: center;
    background: #f4f4f4;
  }

  #room {
    width: 1000px;
    height: 650px;
    margin: auto;
    position: relative;
    background: #e9cfa5;
    border: 4px solid #ddd;
  }

  /* TABLE (RECTANGLE LIKE IMAGE) */
  .table {
    position: absolute;
    width: 140px;
    height: 70px;
    background: #d8b98a;
    border: 2px solid #8c6b3f;
    border-radius: 4px;
    cursor: move;
  }

  /* CHAIR */
  .chair {
    width: 26px;
    height: 26px;
    background: #333;
    border-radius: 6px;
    position: absolute;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 8px;
    color: white;
  }

  .occupied { background: #4caf50; }
  .empty { background: #555; }

  /* ROOM ELEMENTS */
  .glass-wall {
    position: absolute;
    top: 0;
    width: 100%;
    height: 12px;
    background: rgba(180,220,255,0.5);
  }

  .door {
    position: absolute;
    top: 0;
    right: 120px;
    width: 90px;
    height: 12px;
    background: rgba(100,200,255,0.9);
  }

  .aircon {
    position: absolute;
    bottom: 20px;
    right: 20px;
    width: 60px;
    height: 90px;
    background: #ccc;
    transform: rotate(20deg);
  }

  .podium {
    position: absolute;
    width: 60px;
    height: 60px;
    background: white;
    border: 2px solid #ccc;
    top: 280px;
    left: 460px;
  }
</style>
