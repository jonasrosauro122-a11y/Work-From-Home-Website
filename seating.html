<!-- SIMPLE SEATING WEBSITE (NO REACT, NO BACKEND) -->
<!-- Just open this file in browser -->

<!DOCTYPE html>
<html>
<head>
  <title>VA Seating</title>
  <style>
    body { font-family: Arial; text-align: center; }
    .grid { display: grid; grid-template-columns: repeat(6, 100px); gap: 10px; justify-content: center; }
    .seat { border: 1px solid #ccc; padding: 10px; cursor: pointer; border-radius: 10px; }
    .empty { background: #f0f0f0; }
    .occupied { background: #b6fcb6; }
  </style>
</head>
<body>

<h1>VA Seating System</h1>

<input id="name" placeholder="Name">
<input id="agency" placeholder="Agency">
<input type="time" id="timeIn">
<input type="time" id="timeOut">

<br><br>

<button onclick="saveSeat()">Save</button>

<h3 id="selected">Click a seat</h3>

<div class="grid" id="grid"></div>

<script>
  const seats = {};
  let currentSeat = null;

  const grid = document.getElementById('grid');

  function render() {
    grid.innerHTML = '';

    for (let i = 1; i <= 24; i++) {
      const id = 'S' + i;
      const seat = document.createElement('div');
      seat.className = 'seat ' + (seats[id] ? 'occupied' : 'empty');

      seat.innerHTML = `<b>${id}</b><br>` +
        (seats[id]
          ? `${seats[id].name}<br>${seats[id].agency}`
          : 'Empty');

      seat.onclick = () => selectSeat(id);

      grid.appendChild(seat);
    }
  }

  function selectSeat(id) {
    currentSeat = id;
    document.getElementById('selected').innerText = 'Selected: ' + id;

    if (seats[id]) {
      document.getElementById('name').value = seats[id].name;
      document.getElementById('agency').value = seats[id].agency;
      document.getElementById('timeIn').value = seats[id].timeIn;
      document.getElementById('timeOut').value = seats[id].timeOut;
    }
  }

  function saveSeat() {
    if (!currentSeat) return alert('Select a seat');

    seats[currentSeat] = {
      name: document.getElementById('name').value,
      agency: document.getElementById('agency').value,
      timeIn: document.getElementById('timeIn').value,
      timeOut: document.getElementById('timeOut').value
    };

    render();
  }

  render();
</script>

</body>
</html>
