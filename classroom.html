<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Classroom System</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  margin: 0;
  color: white;
  background: linear-gradient(-45deg, #0f172a, #1e293b, #0ea5e9, #9333ea);
  background-size: 400% 400%;
  animation: gradientBG 12s ease infinite;
}

@keyframes gradientBG {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* NAV */
.navbar {
  display: flex;
  justify-content: space-between;
  padding: 15px 25px;
  background: rgba(0,0,0,0.25);
  backdrop-filter: blur(10px);
}

.navbar a {
  color: white;
  text-decoration: none;
  margin-left: 15px;
  padding: 8px 12px;
  border-radius: 8px;
  background: rgba(255,255,255,0.1);
}

/* CONTAINER */
.container {
  max-width: 1100px;
  margin: auto;
  padding: 20px;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
  padding: 20px;
  border-radius: 16px;
  margin-bottom: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

/* INPUTS */
input, select {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 10px;
  border: none;
  outline: none;
}

/* BUTTON */
button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(135deg,#38bdf8,#6366f1);
  color: white;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
}

/* TABLE STYLE */
.table {
  width: 100%;
  border-collapse: collapse;
}

.table th, .table td {
  padding: 12px;
  text-align: center;
}

.table th {
  background: rgba(255,255,255,0.2);
}

.table tr {
  transition: 0.3s;
}

.table tr:hover {
  background: rgba(255,255,255,0.1);
}

/* CLASSROOM TITLE */
.title {
  margin-bottom: 10px;
  font-size: 18px;
}

/* ANIMATION */
.fade {
  animation: fadeIn 0.5s ease;
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(20px);}
  to {opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<!-- NAV -->
<div class="navbar">
  <h2>🧑‍🏫 Classroom System</h2>
  <div>
    <a href="index.html">Dashboard</a>
    <a href="calendar.html">Calendar</a>
    <a href="evaluation.html">Evaluation</a>
    <a href="report.html">Reports</a>
  </div>
</div>

<div class="container">

<!-- FORM -->
<div class="card">
  <h2>Assign VA to Classroom</h2>

  <input id="name" placeholder="VA Name">

  <select id="classroom">
    <option>Classroom A</option>
    <option>Classroom B</option>
  </select>

  <button onclick="addVA()">Add VA</button>
</div>

<!-- CLASSROOM A -->
<div class="card fade">
  <div class="title">🅰️ Classroom A</div>
  <table class="table">
    <thead>
      <tr>
        <th>VA Name</th>
        <th>Classroom</th>
      </tr>
    </thead>
    <tbody id="classA"></tbody>
  </table>
</div>

<!-- CLASSROOM B -->
<div class="card fade">
  <div class="title">🅱️ Classroom B</div>
  <table class="table">
    <thead>
      <tr>
        <th>VA Name</th>
        <th>Classroom</th>
      </tr>
    </thead>
    <tbody id="classB"></tbody>
  </table>
</div>

</div>

<script>
function addVA() {
  let name = document.getElementById("name").value;
  let classroom = document.getElementById("classroom").value;

  if (!name) {
    alert("Enter VA name");
    return;
  }

  let data = JSON.parse(localStorage.getItem("vas")) || [];

  data.push({
    name: name,
    classroom: classroom
  });

  localStorage.setItem("vas", JSON.stringify(data));

  document.getElementById("name").value = "";

  displayVA();
}

function displayVA() {
  let classA = document.getElementById("classA");
  let classB = document.getElementById("classB");

  classA.innerHTML = "";
  classB.innerHTML = "";

  let data = JSON.parse(localStorage.getItem("vas")) || [];

  data.forEach(v => {
    let row = `
      <tr>
        <td>${v.name}</td>
        <td>${v.classroom}</td>
      </tr>
    `;

    if (v.classroom === "Classroom A") {
      classA.innerHTML += row;
    } else {
      classB.innerHTML += row;
    }
  });
}

displayVA();
</script>

</body>
</html>
