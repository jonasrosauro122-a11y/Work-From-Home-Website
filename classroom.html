<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VA Classroom Assignment</title>
<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        display: flex;
        height: 100vh;
    }

    /* TOP FORM */
    .top-bar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        background: #F4F4F4;
        padding: 10px;
        display: flex;
        gap: 10px;
        border-bottom: 1px solid #ccc;
        z-index: 1000;
    }

    .top-bar input, .top-bar select, .top-bar button {
        padding: 6px;
    }

    /* LEFT SIDEBAR */
    .sidebar {
        width: 200px;
        background: #2C3E50;
        color: white;
        padding-top: 60px;
    }

    .trainer {
        padding: 15px;
        cursor: pointer;
        border-bottom: 1px solid #444;
    }

    .trainer:hover {
        background: #34495E;
    }

    /* MAIN CONTENT */
    .main {
        flex: 1;
        padding-top: 60px;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #ECF0F1;
    }

    .classroom {
        display: grid;
        grid-template-columns: repeat(3, 100px);
        grid-gap: 15px;
        text-align: center;
    }

    .seat {
        width: 100px;
        height: 80px;
        background: white;
        border: 2px solid #3498DB;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 12px;
        padding: 5px;
    }

    .trainer-photo {
        grid-column: span 3;
        font-weight: bold;
        margin-bottom: 10px;
    }
</style>
</head>
<body>

<!-- TOP FORM -->
<div class="top-bar">
    <input type="text" id="vaName" placeholder="VA Name">

    <select id="agency">
        <option value="">Select Agency</option>
        <option>Agency 1</option>
        <option>Agency 2</option>
    </select>

    <select id="classroom">
        <option value="">Classroom</option>
        <option>A</option>
        <option>B</option>
    </select>

    <select id="trainerSelect">
        <option value="">Trainer</option>
        <option>Au</option>
        <option>Chanie</option>
        <option>Leo</option>
    </select>

    <button onclick="addVA()">Add VA</button>
</div>

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="trainer" onclick="showTrainer('Au')">Au</div>
    <div class="trainer" onclick="showTrainer('Chanie')">Chanie</div>
    <div class="trainer" onclick="showTrainer('Leo')">Leo</div>
</div>

<!-- MAIN DISPLAY -->
<div class="main">
    <div id="classroomView"></div>
</div>

<script>
    const data = {
        Au: [],
        Chanie: [],
        Leo: []
    };

    let currentTrainer = "Au";

    function showTrainer(name) {
        currentTrainer = name;
        renderClassroom();
    }

    function addVA() {
        const name = document.getElementById("vaName").value;
        const agency = document.getElementById("agency").value;
        const classroom = document.getElementById("classroom").value;
        const trainer = document.getElementById("trainerSelect").value;

        if (!name || !trainer) {
            alert("Please enter VA name and trainer");
            return;
        }

        if (data[trainer].length >= 9) {
            alert("Max 9 seats only!");
            return;
        }

        data[trainer].push({
            name,
            agency,
            classroom
        });

        renderClassroom();
    }

    function renderClassroom() {
        const container = document.getElementById("classroomView");
        container.innerHTML = "";

        const classroomDiv = document.createElement("div");
        classroomDiv.className = "classroom";

        const trainerTitle = document.createElement("div");
        trainerTitle.className = "trainer-photo";
        trainerTitle.innerText = currentTrainer + " (Trainer)";
        classroomDiv.appendChild(trainerTitle);

        const students = data[currentTrainer];

        for (let i = 0; i < 9; i++) {
            const seat = document.createElement("div");
            seat.className = "seat";

            if (students[i]) {
                seat.innerText = students[i].name + "\n(" + students[i].classroom + ")";
            } else {
                seat.innerText = "Empty Seat";
            }

            classroomDiv.appendChild(seat);
        }

        container.appendChild(classroomDiv);
    }

    // Initial load
    renderClassroom();
</script>

</body>
</html>
